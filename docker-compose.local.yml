services:
  frontend:
    build: ./frontend
    container_name: mmorpg_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=100
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: mmorpg_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: mmorpg_redis
    ports:
      - "6379:6379"